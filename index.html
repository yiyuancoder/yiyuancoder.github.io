<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素流关卡设计工具 (PixelFlow Level Editor)</title>
    <style>
        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 15px;
            color: #2d3436;
            margin: 0;
            font-size: 16px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(9, 132, 227, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(9, 132, 227, 0.5);
        }

        .main-container {
            max-width: 70%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2d3436;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #0984e3, #6c5ce7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .controls {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: #636e72;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"],
        input[type="text"],
        select {
            padding: 10px 14px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            background: #fff;
            transition: all 0.3s ease;
            outline: none;
            color: #2d3436;
            font-weight: 500;
        }

        input[type="file"] {
            padding: 8px;
            border: 2px dashed #b2bec3;
            border-radius: 10px;
            background: #fdfdfd;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #0984e3;
            background: #f1f9ff;
        }

        input:focus {
            border-color: #0984e3;
            box-shadow: 0 0 0 4px rgba(9, 132, 227, 0.1);
        }

        input[type="number"] {
            width: 100px;
        }

        input[type="text"] {
            width: 180px;
        }

        button {
            cursor: pointer;
            background: linear-gradient(135deg, #0984e3, #00cec9);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(9, 132, 227, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        button.download-btn {
            background: linear-gradient(135deg, #00b894, #55efc4);
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }

        .palette-selector {
            position: sticky;
            top: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin: 0 auto 30px;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .palette-selector strong {
            display: block;
            margin-bottom: 12px;
            font-size: 14px;
            color: #2d3436;
            opacity: 0.8;
        }

        .palette-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .palette-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .palette-item:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .palette-item.active {
            border-color: #fff;
            transform: translateY(-5px) scale(1.15);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2), 0 0 0 3px #0984e3;
        }

        #editor-container {
            overflow: auto;
            background: #999;
            padding: 20px;
            border-radius: 8px;
            display: none;
            justify-content: center;
            min-height: 300px;
            margin-top: 20px;
        }

        #grid {
            display: grid;
            gap: 1px;
            background-color: #ccc;
            border: 1px solid #999;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.15);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            transition: transform 0.1s;
        }

        .cell:hover {
            filter: brightness(1.1);
            z-index: 10;
        }

        .header-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #747d8c !important;
            color: #fff !important;
            font-size: 11px;
            font-weight: 800;
            cursor: default !important;
            user-select: none;
            pointer-events: none;
            text-shadow: none !important;
        }

        canvas {
            display: none;
        }
    </style>
</head>
